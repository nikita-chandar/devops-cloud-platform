name: DevOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Build Docker Image
      run: |
        docker build -t devops-app ./app


    - name: Test Docker Image
      run: |
        docker images
